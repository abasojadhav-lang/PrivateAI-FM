services:
  - type: web
    name: privatefm-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: privatefm-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: privatefm-redis
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false
      - key: GCLOUD_TTS_API_KEY
        sync: false

  - type: redis
    name: privatefm-redis
    plan: free

databases:
  - name: privatefm-db
    plan: free
